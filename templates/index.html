<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表情识别系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            padding: 12px 30px;
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
        }

        .tab-content {
            display: none;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .tab-content.active {
            display: block;
        }

        .video-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: flex-start;
        }

        .video-main {
            flex: 1;
            text-align: center;
        }

        #cameraFeed {
            width: 100%;
            max-width: 640px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            background: #2d3748;
            min-height: 400px;
            display: none;
        }

        #cameraFeed.active {
            display: block;
        }

        .camera-placeholder {
            width: 100%;
            max-width: 640px;
            min-height: 400px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            margin: 0 auto;
        }

        .emotion-chart {
            width: 350px;
            background: #f7fafc;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .emotion-chart h3 {
            margin-bottom: 20px;
            color: #2d3748;
            font-size: 18px;
            text-align: center;
        }

        .emotion-bar {
            margin-bottom: 15px;
        }

        .emotion-bar-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
            color: #4a5568;
        }

        .emotion-bar-bg {
            width: 100%;
            height: 25px;
            background: #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .emotion-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .emotion-bar-fill.empty {
            background: #cbd5e0;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245,101,101,0.4);
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .upload-area:hover {
            background: #f7fafc;
            border-color: #5568d3;
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .upload-label {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-label:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .result-area {
            margin-top: 30px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 10px;
            display: none;
        }

        .result-area.show {
            display: block;
        }

        .result-image {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 15px;
        }

        .emotion-badge {
            display: inline-block;
            padding: 8px 20px;
            background: #48bb78;
            color: white;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
        }

        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-box {
            background: #e6fffa;
            border-left: 4px solid #38b2ac;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
        }

        .info-box h3 {
            color: #234e52;
            margin-bottom: 10px;
        }

        .info-box p {
            color: #2c7a7b;
            line-height: 1.6;
        }

        .progress-container {
            width: 100%;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }

        .progress-container.show {
            display: block;
        }

        .progress-bar {
            height: 30px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .report-box {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .report-box h4 {
            color: #2d3748;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .emotion-stat {
            margin-bottom: 15px;
        }

        .emotion-stat-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
            color: #2d3748;
            font-weight: 500;
        }

        .emotion-stat-bar {
            width: 100%;
            height: 30px;
            background: #e2e8f0;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .emotion-stat-fill {
            height: 100%;
            background: linear-gradient(90deg, #48bb78 0%, #38a169 100%);
            border-radius: 15px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: bold;
            min-width: 0;
        }

        .emotion-stat-fill.top1 {
            background: linear-gradient(90deg, #f6ad55 0%, #ed8936 100%);
        }

        .emotion-stat-fill.top2 {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        }

        .emotion-stat-fill.top3 {
            background: linear-gradient(90deg, #48bb78 0%, #38a169 100%);
        }

        .emotion-stat:last-child {
            margin-bottom: 0;
        }
        }

        .success-badge {
            display: inline-block;
            padding: 10px 20px;
            background: #48bb78;
            color: white;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            margin: 15px 0;
        }

        .camera-report {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .camera-report.show {
            display: block;
        }

        .report-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            margin: -20px -20px 20px -20px;
        }

        .report-header h4 {
            margin: 0;
            font-size: 20px;
        }

        .report-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .summary-card .value {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .summary-card .label {
            font-size: 14px;
            opacity: 0.9;
        }

        .emotion-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin-bottom: 10px;
            background: #f7fafc;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .emotion-stat .emotion-name {
            font-weight: bold;
            color: #2d3748;
        }

        .emotion-stat .emotion-value {
            color: #667eea;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .video-container {
                flex-direction: column;
            }

            .emotion-chart {
                width: 100%;
            }

            #cameraFeed {
                max-width: 100%;
            }

            .camera-placeholder {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎭 表情识别系统</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('camera')">📹 摄像头检测</button>
            <button class="tab-btn" onclick="switchTab('image')">🖼️ 图片检测</button>
            <button class="tab-btn" onclick="switchTab('video')">🎬 视频检测</button>
        </div>

        <!-- 摄像头检测 -->
        <div id="camera" class="tab-content active">
            <div class="video-container">
                <div class="video-main">
                    <div class="camera-placeholder" id="cameraPlaceholder">
                        📹 点击"启动摄像头"开始检测
                    </div>
                    <img id="cameraFeed" src="" alt="摄像头画面">
                </div>
                <div class="emotion-chart" id="emotionChart" style="display: none;">
                    <h3>📊 实时表情统计</h3>
                    <div id="emotionBars"></div>
                </div>
            </div>
            <div class="controls">
                <button class="btn btn-primary" onclick="startCamera()">启动摄像头</button>
                <button class="btn btn-danger" onclick="stopCamera()">停止摄像头</button>
            </div>
            <div class="camera-report" id="cameraReport">
                <div class="report-header">
                    <h4>📋 检测报告</h4>
                </div>
                <div id="cameraStats"></div>
            </div>
            <div class="info-box">
                <h3>使用说明</h3>
                <p>点击"启动摄像头"开始实时检测表情。系统会自动识别人脸并标注当前表情。</p>
            </div>
        </div>

        <!-- 图片检测 -->
        <div id="image" class="tab-content">
            <div class="upload-area">
                <label for="imageUpload" class="upload-label">📁 选择图片</label>
                <input type="file" id="imageUpload" accept="image/*" onchange="detectImage()">
                <p style="margin-top: 15px; color: #718096;">支持 JPG、PNG 格式</p>
            </div>
            <div class="loading" id="imageLoading">
                <div class="spinner"></div>
                <p style="margin-top: 10px; color: #667eea;">分析中...</p>
            </div>
            <div class="result-area" id="imageResult">
                <h3>检测结果</h3>
                <div class="emotion-badge" id="imageEmotion"></div>
                <img id="resultImage" class="result-image" src="" alt="检测结果">
            </div>
            <div class="info-box">
                <h3>使用说明</h3>
                <p>上传包含人脸的图片，系统会自动识别表情并在图片上标注结果。</p>
            </div>
        </div>

        <!-- 视频检测 -->
        <div id="video" class="tab-content">
            <div class="upload-area">
                <label for="videoUpload" class="upload-label">📁 选择视频</label>
                <input type="file" id="videoUpload" accept="video/*" onchange="detectVideo()">
                <p style="margin-top: 15px; color: #718096;">支持 MP4、AVI 格式</p>
            </div>
            <div class="progress-container" id="videoProgress">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
            <div class="loading" id="videoLoading">
                <div class="spinner"></div>
                <p style="margin-top: 10px; color: #667eea;" id="videoLoadingText">处理中，请稍候...</p>
            </div>
            <div class="result-area" id="videoResult">
                <div class="success-badge">✓ 处理完成</div>
                <div class="report-box">
                    <h4>处理结果</h4>
                    <div id="videoMessage"></div>
                </div>
                <div class="report-box" id="videoReportBox" style="display: none;">
                    <div class="report-header">
                        <h4>📊 表情统计报告</h4>
                    </div>
                    <div id="videoStats"></div>
                </div>
            </div>
            <div class="info-box">
                <h3>使用说明</h3>
                <p>上传视频文件，系统会逐帧分析表情并生成带标注的视频和统计报告。处理时间取决于视频长度。</p>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            // 隐藏所有标签页
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // 显示选中的标签页
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        let statsUpdateInterval = null;

        function startCamera() {
            fetch('/camera/start', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    alert(data.message);
                    document.getElementById('cameraPlaceholder').style.display = 'none';
                    document.getElementById('cameraFeed').classList.add('active');
                    document.getElementById('cameraFeed').src = '/camera/feed?' + new Date().getTime();
                    document.getElementById('cameraReport').classList.remove('show');
                    document.getElementById('emotionChart').style.display = 'block';

                    // 启动实时统计更新
                    startStatsUpdate();
                });
        }

        function stopCamera() {
            // 停止实时统计更新
            if (statsUpdateInterval) {
                clearInterval(statsUpdateInterval);
                statsUpdateInterval = null;
            }

            fetch('/camera/stop', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    alert(data.message);
                    document.getElementById('cameraFeed').src = '';
                    document.getElementById('cameraFeed').classList.remove('active');
                    document.getElementById('cameraPlaceholder').style.display = 'flex';
                    document.getElementById('emotionChart').style.display = 'none';

                    // 显示检测报告
                    if (data.report) {
                        displayCameraReport(data.report);
                    }
                });
        }

        function startStatsUpdate() {
            // 每500ms更新一次统计数据
            statsUpdateInterval = setInterval(() => {
                fetch('/camera/stats')
                    .then(response => response.json())
                    .then(data => {
                        updateRealtimeChart(data);
                    })
                    .catch(error => console.error('获取统计失败:', error));
            }, 500);
        }

        function updateRealtimeChart(stats) {
            const emotionBars = document.getElementById('emotionBars');
            const emotions = stats.emotion_stats || {};
            const total = stats.total_frames || 1;

            // 定义所有可能的情绪
            const allEmotions = ['angry', 'disgust', 'fear', 'happy', 'sad', 'surprise', 'neutral'];
            const emotionNames = {
                'angry': '生气',
                'disgust': '厌恶',
                'fear': '恐惧',
                'happy': '开心',
                'sad': '悲伤',
                'surprise': '惊讶',
                'neutral': '平静'
            };

            let html = '';
            allEmotions.forEach(emotion => {
                const count = emotions[emotion] || 0;
                const percentage = total > 0 ? ((count / total) * 100).toFixed(1) : 0;

                html += `
                    <div class="emotion-bar">
                        <div class="emotion-bar-label">
                            <span>${emotionNames[emotion]}</span>
                            <span>${percentage}%</span>
                        </div>
                        <div class="emotion-bar-bg">
                            <div class="emotion-bar-fill" style="width: ${percentage}%">
                                ${percentage > 5 ? percentage + '%' : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            emotionBars.innerHTML = html;
        }

        function displayCameraReport(report) {
            const total = report.total_frames;
            const emotions = report.emotion_stats || {};

            // 计算总百分比（应该是100%）
            const sortedEmotions = Object.entries(emotions)
                .sort((a, b) => b[1] - a[1]);

            const emotionNames = {
                'angry': '生气',
                'disgust': '厌恶',
                'fear': '恐惧',
                'happy': '开心',
                'sad': '悲伤',
                'surprise': '惊讶',
                'neutral': '平静'
            };

            let statsHtml = `
                <div class="report-summary">
                    <div class="summary-card">
                        <div class="value">${total}</div>
                        <div class="label">总帧数</div>
                    </div>
                    <div class="summary-card">
                        <div class="value">${sortedEmotions.length}</div>
                        <div class="label">检测到的表情</div>
                    </div>
                </div>
                <h4 style="margin: 20px 0 15px 0; color: #2d3748;">表情分布（总计100%）</h4>
            `;

            sortedEmotions.forEach(([emotion, count], index) => {
                const percentage = ((count / total) * 100).toFixed(1);
                const rankClass = index === 0 ? 'top1' : index === 1 ? 'top2' : index === 2 ? 'top3' : '';
                const emotionCn = emotionNames[emotion] || emotion;

                statsHtml += `
                    <div class="emotion-stat">
                        <div class="emotion-stat-label">
                            <span>${emotionCn}</span>
                            <span>${count} 次 · ${percentage}%</span>
                        </div>
                        <div class="emotion-stat-bar">
                            <div class="emotion-stat-fill ${rankClass}" style="width: ${percentage}%">
                                ${percentage}%
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('cameraStats').innerHTML = statsHtml;
            document.getElementById('cameraReport').classList.add('show');
        }

        function detectImage() {
            const fileInput = document.getElementById('imageUpload');
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            document.getElementById('imageLoading').classList.add('show');
            document.getElementById('imageResult').classList.remove('show');

            fetch('/image/detect', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('imageLoading').classList.remove('show');
                if (data.status === 'success') {
                    document.getElementById('imageEmotion').textContent = '表情: ' + data.emotion_cn;
                    document.getElementById('resultImage').src = '/static/snapshots/' + data.result_image;
                    document.getElementById('imageResult').classList.add('show');
                } else {
                    alert(data.message);
                }
            })
            .catch(error => {
                document.getElementById('imageLoading').classList.remove('show');
                alert('检测失败: ' + error);
            });
        }

        function detectVideo() {
            const fileInput = document.getElementById('videoUpload');
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            // 重置UI
            document.getElementById('videoProgress').classList.add('show');
            document.getElementById('videoLoading').classList.add('show');
            document.getElementById('videoResult').classList.remove('show');
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressBar').textContent = '0%';

            fetch('/video/detect', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    // 开始轮询进度
                    checkVideoProgress();
                } else {
                    document.getElementById('videoLoading').classList.remove('show');
                    document.getElementById('videoProgress').classList.remove('show');
                    alert(data.message);
                }
            })
            .catch(error => {
                document.getElementById('videoLoading').classList.remove('show');
                document.getElementById('videoProgress').classList.remove('show');
                alert('上传失败: ' + error);
            });
        }

        function checkVideoProgress() {
            const progressInterval = setInterval(() => {
                fetch('/video/progress')
                    .then(response => response.json())
                    .then(data => {
                        const progress = data.progress || 0;
                        document.getElementById('progressBar').style.width = progress + '%';
                        document.getElementById('progressBar').textContent = progress + '%';
                        document.getElementById('videoLoadingText').textContent = data.message || '处理中...';

                        if (data.status === 'completed') {
                            clearInterval(progressInterval);
                            document.getElementById('videoLoading').classList.remove('show');
                            document.getElementById('videoProgress').classList.remove('show');

                            // 显示结果
                            let messageHtml = `<p><strong>输出视频:</strong> ${data.output_video}</p>`;
                            messageHtml += `<p><strong>分析报告:</strong> ${data.report}</p>`;
                            messageHtml += `<p style="margin-top: 10px; color: #718096;">文件保存在 output 目录中</p>`;
                            document.getElementById('videoMessage').innerHTML = messageHtml;

                            // 显示表情统计
                            if (data.emotion_stats && Object.keys(data.emotion_stats).length > 0) {
                                displayVideoReport(data);
                            }

                            document.getElementById('videoResult').classList.add('show');
                        }
                    })
                    .catch(error => {
                        clearInterval(progressInterval);
                        console.error('进度查询失败:', error);
                    });
            }, 1000);
        }

        function displayVideoReport(data) {
            const total = data.total_frames;
            const emotions = data.emotion_stats || {};

            const sortedEmotions = Object.entries(emotions)
                .sort((a, b) => b[1] - a[1]);

            const emotionNames = {
                'angry': '生气',
                'disgust': '厌恶',
                'fear': '恐惧',
                'happy': '开心',
                'sad': '悲伤',
                'surprise': '惊讶',
                'neutral': '平静'
            };

            let statsHtml = `
                <div class="report-summary">
                    <div class="summary-card">
                        <div class="value">${total}</div>
                        <div class="label">总帧数</div>
                    </div>
                    <div class="summary-card">
                        <div class="value">${sortedEmotions.length}</div>
                        <div class="label">检测到的表情</div>
                    </div>
                </div>
                <h4 style="margin: 20px 0 15px 0; color: #2d3748;">表情分布（总计100%）</h4>
            `;

            sortedEmotions.forEach(([emotion, count], index) => {
                const percentage = ((count / total) * 100).toFixed(1);
                const rankClass = index === 0 ? 'top1' : index === 1 ? 'top2' : index === 2 ? 'top3' : '';
                const emotionCn = emotionNames[emotion] || emotion;

                statsHtml += `
                    <div class="emotion-stat">
                        <div class="emotion-stat-label">
                            <span>${emotionCn}</span>
                            <span>${count} 次 · ${percentage}%</span>
                        </div>
                        <div class="emotion-stat-bar">
                            <div class="emotion-stat-fill ${rankClass}" style="width: ${percentage}%">
                                ${percentage}%
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('videoStats').innerHTML = statsHtml;
            document.getElementById('videoReportBox').style.display = 'block';
        }
    </script>
</body>
</html>
